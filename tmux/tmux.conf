# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# General
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g history-limit 50000
set -g focus-events on
set -g mouse on
set -g repeat-time 0
setw -g mode-keys vi

# Terminal
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ',*:RGB'
set -sa terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -sa terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Reload config
bind R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Splits (in current path)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Windows
bind c new-window -c "#{pane_current_path}"
bind space next-window
bind bspace previous-window
bind t next-window
bind T previous-window
bind a last-pane

# Layouts
bind enter next-layout
bind + select-layout main-horizontal
bind = select-layout main-vertical
bind C-o rotate-window

# Copy mode
bind [ copy-mode
bind ] paste-buffer
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel

# Misc
bind : command-prompt
bind r refresh-client
bind L clear-history
bind q display-panes

# Pane display
set -g display-panes-time 1500
setw -g main-pane-height 25
setw -g main-pane-width 80

# Activity
setw -g monitor-activity on
set -g visual-activity off

# Status bar
set-option -g status-interval 5
set -g status-justify "left"
set -g status "on"
set -g status-left-style "none"
set -g message-command-style "fg=#a89984,bg=#504945"
set -g status-right-style "none"
set -g pane-active-border-style "fg=#a89984"
set -g status-style "none,bg=#3c3836"
set -g message-style "fg=#a89984,bg=#504945"
set -g pane-border-style "fg=#504945"
set -g status-right-length "100"
set -g status-left-length "100"
setw -g window-status-activity-style "none"
setw -g window-status-separator ""
setw -g window-status-style "none,fg=#a89984,bg=#3c3836"
set -g status-left "#[fg=#1d2021,bg=#a89984] #S #[fg=#a89984,bg=#3c3836,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#504945,bg=#3c3836,nobold,nounderscore,noitalics]#[fg=#a89984,bg=#504945] %Y-%m-%d  %H:%M #[fg=#a89984,bg=#504945,nobold,nounderscore,noitalics]#[fg=#1d2021,bg=#a89984] #{pane_current_path} "
setw -g window-status-format "#[fg=#a89984,bg=#3c3836] #I #[fg=#a89984,bg=#3c3836] #W "
setw -g window-status-current-format "#[fg=#3c3836,bg=#504945,nobold,nounderscore,noitalics]#[fg=#a89984,bg=#504945] #I #[fg=#a89984,bg=#504945] #W #[fg=#504945,bg=#3c3836,nobold,nounderscore,noitalics]"
